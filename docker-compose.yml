version: '3.8'

services:
  # MailHog для перехвата почты
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"    # SMTP
      - "8025:8025"    # Web UI

  # Kafka в режиме KRaft (контроллер + брокер в одном процессе)
  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      # включаем KRaft (без ZooKeeper)
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_NODE_ID: "1"
      # однорегионный кворум: узел 1 слушает контроллер на порту 9093
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # какие интерфейсы слушаем
      KAFKA_CFG_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      # имя контроллерного слушателя
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
    volumes:
      - kafka_data:/bitnami/kafka

  # PostgreSQL для user-service
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: "user"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "users_db"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Spring Cloud Config Server
  config-server:
    build:
      context: ./7-stage/notification-platform/config-server
      dockerfile: Dockerfile
    volumes:
      - ./7-stage/config-repo:/config-repo
    environment:
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:/config-repo
    ports:
      - "8888:8888"
    depends_on:
      - postgres

  # Eureka Service Discovery
  discovery-server:
    build:
      context: ./7-stage/notification-platform/eureka-server
      dockerfile: Dockerfile
    environment:
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
    ports:
      - "8761:8761"

  # API Gateway
  api-gateway:
    build:
      context: ./7-stage/notification-platform/api-gateway
      dockerfile: Dockerfile
    environment:
      SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
    ports:
      - "8080:8082"
    depends_on:
      - discovery-server
      - config-server

  # User Service
  user-service:
    build:
      context: ./4-stage/userService-4-module
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/users_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8080"
    depends_on:
      - postgres
      - config-server
      - discovery-server
      - kafka

  # Notification Service
  notification-service:
    build:
      context: ./7-stage/notification-platform/notification-service
      dockerfile: Dockerfile
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
    ports:
      - "8082:8082"
    depends_on:
      - config-server
      - discovery-server
      - kafka
      - mailhog

volumes:
  postgres_data:
  kafka_data:
